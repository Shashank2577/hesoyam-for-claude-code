name: CI — Lint & Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'

  link-check:
    name: Link Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-loopback
            --exclude-mail
            --exclude 'https://github.com/.*/releases'
            --exclude 'granola.so'
            --include-fragments
            --timeout 30
            '**/*.md'
          fail: true

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@v2.0.0
        with:
          scandir: '.'
          severity: warning

  structure-check:
    name: Repo Structure Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          missing=0
          required_files=(
            "README.md"
            "CONTRIBUTING.md"
            "CODE_OF_CONDUCT.md"
            "LICENSE"
            "COMPATIBILITY.md"
            "install.sh"
            "guides/pick-your-path.md"
            "guides/daily-usage.md"
            "guides/security.md"
            "guides/token-optimization.md"
            "guides/memory-strategies.md"
            "guides/multi-agent-patterns.md"
            "guides/obsidian-setup.md"
            "guides/obsidian-git-workflow.md"
            "guides/claude-mem-obsidian-synergy.md"
            "guides/notebooklm-workflows.md"
            "guides/discovery-ecosystem.md"
            "playbooks/greenfield-feature.md"
            "playbooks/legacy-migration.md"
            "playbooks/bug-hunt.md"
            "playbooks/sprint-execution.md"
            "playbooks/code-review-pipeline.md"
            "knowledge/templates/research-brief.md"
            "knowledge/templates/technology-evaluation.md"
            "knowledge/templates/adr-template.md"
            "knowledge/templates/spike-report.md"
          )

          for f in "${required_files[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "MISSING: $f"
              missing=$((missing + 1))
            fi
          done

          if [[ $missing -gt 0 ]]; then
            echo ""
            echo "$missing required file(s) missing!"
            exit 1
          else
            echo "All required files present."
          fi

      - name: Verify vault template structure
        run: |
          dirs=(
            "knowledge/obsidian-vault-template/00_Inbox"
            "knowledge/obsidian-vault-template/01_Projects"
            "knowledge/obsidian-vault-template/02_Areas"
            "knowledge/obsidian-vault-template/03_Resources"
            "knowledge/obsidian-vault-template/03_Resources/debugging-journal"
            "knowledge/obsidian-vault-template/03_Resources/ecosystem"
            "knowledge/obsidian-vault-template/03_Resources/patterns"
            "knowledge/obsidian-vault-template/03_Resources/research"
            "knowledge/obsidian-vault-template/03_Resources/tech-decisions"
            "knowledge/obsidian-vault-template/04_Archive"
            "knowledge/obsidian-vault-template/05_Attachments"
            "knowledge/obsidian-vault-template/06_Templates"
          )

          for d in "${dirs[@]}"; do
            if [[ ! -d "$d" ]]; then
              echo "MISSING directory: $d"
              exit 1
            fi
          done
          echo "Vault template structure valid."

      - name: Verify skills exist
        run: |
          skill_count=$(find .claude/skills -name '*.md' -not -name '.gitkeep' | wc -l)
          if [[ $skill_count -lt 1 ]]; then
            echo "No skills found in .claude/skills/"
            exit 1
          fi
          echo "Found $skill_count skill(s)."

      - name: Check install.sh is executable
        run: |
          if [[ ! -x "install.sh" ]]; then
            echo "install.sh is not executable. Run: chmod +x install.sh"
            exit 1
          fi
          echo "install.sh is executable."

      - name: Smoke test install.sh --dry-run
        run: |
          # Full pillar sequence
          ./install.sh --dry-run
          echo "install.sh --dry-run (all pillars) exited cleanly."

          # Individual pillar smoke tests
          ./install.sh --dry-run --pillar orchestration
          echo "install.sh --dry-run --pillar orchestration exited cleanly."

          ./install.sh --dry-run --pillar memory
          echo "install.sh --dry-run --pillar memory exited cleanly."

          # Knowledge pillar with explicit vault-path exercises VAULT_PATH expansion logic
          ./install.sh --dry-run --pillar knowledge --vault-path /tmp/test-vault
          echo "install.sh --dry-run --pillar knowledge --vault-path exited cleanly."

          ./install.sh --dry-run --pillar discovery
          echo "install.sh --dry-run --pillar discovery exited cleanly."
