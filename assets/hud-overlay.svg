<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260">
  <defs>
    <linearGradient id="hudBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <filter id="hudGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="620" height="260" fill="url(#hudBg)" rx="10"/>
  <rect x="1" y="1" width="618" height="258" fill="none" stroke="#333" stroke-width="1" rx="10"/>

  <!-- HUD Title -->
  <text x="310" y="32" font-family="'Impact', 'Arial Black', sans-serif" font-size="16" fill="#888" text-anchor="middle" letter-spacing="6">PLAYER STATUS</text>
  <line x1="40" y1="42" x2="580" y2="42" stroke="#333" stroke-width="1"/>

  <!-- HEALTH BAR (Memory) -->
  <text x="45" y="78" font-family="'Courier New', monospace" font-size="22" fill="#ff3333" filter="url(#hudGlow)">&#10084;</text>
  <rect x="80" y="62" width="300" height="20" fill="#1a0000" rx="3"/>
  <rect x="80" y="62" width="300" height="20" fill="#cc0000" rx="3" opacity="0.9"/>
  <rect x="80" y="62" width="300" height="10" fill="#ff3333" rx="3" opacity="0.3"/>
  <text x="400" y="78" font-family="'Courier New', monospace" font-size="14" fill="#ff6666">Memory: Active</text>

  <!-- ARMOR BAR (Security) -->
  <text x="45" y="118" font-family="'Courier New', monospace" font-size="20" fill="#4488ff" filter="url(#hudGlow)">&#9711;</text>
  <rect x="80" y="102" width="300" height="20" fill="#000a1a" rx="3"/>
  <rect x="80" y="102" width="300" height="20" fill="#1155cc" rx="3" opacity="0.9"/>
  <rect x="80" y="102" width="300" height="10" fill="#4488ff" rx="3" opacity="0.3"/>
  <text x="400" y="118" font-family="'Courier New', monospace" font-size="14" fill="#6699ff">Security: Armed</text>

  <!-- MONEY (Productivity) -->
  <text x="45" y="158" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" fill="#00cc00" filter="url(#hudGlow)">$</text>
  <text x="80" y="158" font-family="'Impact', 'Arial Black', sans-serif" font-size="24" fill="#00ff41" filter="url(#hudGlow)">$250,000</text>
  <text x="400" y="158" font-family="'Courier New', monospace" font-size="14" fill="#00cc66">Productivity: Max</text>

  <!-- WANTED LEVEL -->
  <text x="45" y="198" font-family="'Courier New', monospace" font-size="20" fill="#444">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
  <text x="400" y="198" font-family="'Courier New', monospace" font-size="14" fill="#666">Wanted Level: 0</text>

  <!-- LOCATION -->
  <line x1="40" y1="218" x2="580" y2="218" stroke="#333" stroke-width="1"/>
  <text x="45" y="242" font-family="'Courier New', monospace" font-size="13" fill="#555">&#9673; Los Santos</text>
  <text x="400" y="242" font-family="'Courier New', monospace" font-size="13" fill="#00cc66">Vault: Synced &#10003;</text>
</svg>
